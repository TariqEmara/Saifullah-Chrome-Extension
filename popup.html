<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>سيف الله</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px; min-height: 370px;
      background: linear-gradient(160deg, #0d0800 0%, #1c1000 100%);
      color: #f0dca0; font-family: 'Amiri', serif; overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #3a1e00, #5a2d00);
      padding: 18px 20px;
      border-bottom: 1px solid rgba(200,134,10,0.3);
      display: flex; align-items: center; gap: 14px;
      position: relative;
    }

    .sword-icon { font-size: 28px; filter: drop-shadow(0 0 8px rgba(200,134,10,0.6)); }

    .header-text .title {
      font-family: 'Scheherazade New', serif;
      font-size: 22px; color: #f0b030;
      text-shadow: 0 0 16px rgba(200,134,10,0.5);
      line-height: 1;
    }
    .header-text .subtitle {
      font-size: 11px; color: rgba(240,200,80,0.45);
      direction: ltr; letter-spacing: 1.5px; margin-top: 3px;
    }

    .status-row {
      padding: 16px 20px 8px;
      display: flex; align-items: center; gap: 10px;
    }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #c8860a; box-shadow: 0 0 8px #c8860a;
      animation: pulse 2s ease infinite; flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

    .status-text { font-size: 13px; color: rgba(240,200,80,0.7); direction: ltr; }

    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 8px 20px;
    }

    .stat-box {
      background: rgba(58,30,0,0.4);
      border: 1px solid rgba(200,134,10,0.15);
      border-radius: 10px; padding: 12px; text-align: center;
    }
    .stat-num { font-size: 22px; font-weight: 700; color: #f0b030; display: block; }
    .stat-label { font-size: 10px; color: rgba(240,200,80,0.4); margin-top: 3px; display: block; direction: ltr; }

    .verse-strip {
      margin: 8px 20px;
      background: rgba(20,10,0,0.5);
      border: 1px solid rgba(200,134,10,0.12);
      border-radius: 10px; padding: 12px 14px;
      text-align: right;
    }
    .verse-text { font-size: 12px; line-height: 1.9; color: rgba(240,220,140,0.65); }
    .verse-src { font-size: 10px; color: rgba(200,134,10,0.5); margin-top: 5px; }

    .khalid-line {
      margin: 0 20px 14px;
      font-size: 11px; font-style: italic;
      color: rgba(240,200,80,0.3); text-align: center;
      direction: ltr; line-height: 1.5;
    }

    .footer { padding: 0 20px 18px; }
    .btn {
      width: 100%; padding: 11px;
      border-radius: 8px; border: 1px solid rgba(200,134,10,0.3);
      background: linear-gradient(135deg, #5a2d00, #3a1800);
      color: #f0d080; font-family: 'Amiri', serif; font-size: 14px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { background: linear-gradient(135deg, #7a3e00, #5a2d00); }
  </style>
</head>
<body>

<div class="header">
  <div class="sword-icon">⚔️</div>
  <div class="header-text">
    <div class="title">سيف الله</div>
    <div class="subtitle">SAIFULLAH · SWORD OF ALLAH</div>
  </div>
</div>

<div class="status-row">
  <div class="status-dot"></div>
  <div class="status-text">Protection active · سيف الله فعّال</div>
</div>

<div class="stats-grid">
  <div class="stat-box">
    <span class="stat-num" id="blocked-count">…</span>
    <span class="stat-label">Threats Cut Down</span>
  </div>
  <div class="stat-box">
    <span class="stat-num" id="days-active">…</span>
    <span class="stat-label">Days on Guard</span>
  </div>
</div>

<div class="verse-strip">
  <div class="verse-text">يَسْتَخْفُونَ مِنَ النَّاسِ وَلَا يَسْتَخْفُونَ مِنَ اللَّهِ وَهُوَ مَعَهُمْ</div>
  <div class="verse-src">سورة النساء ٤:١٠٨</div>
</div>

<div class="khalid-line">"O Khalid, you are the Sword of Allah — unsheathed upon His enemies."<br>— The Prophet ﷺ</div>

<div class="footer">
  <button class="btn" onclick="window.close()">⚔ سيف الله يحرسك · Stay on the Path</button>
</div>

<script src="popup.js"></script>
</body>
</html>
